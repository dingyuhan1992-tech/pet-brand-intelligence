<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 宠物保健品智能大脑</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%); padding: 20px 30px; border-bottom: 1px solid #2a2f45; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .header .update-time { font-size: 12px; color: #666; }
  .badge { background: #00d4aa22; color: #00d4aa; padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #00d4aa44; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: #1a1f2e; border: 1px solid #2a2f45; border-radius: 12px; padding: 20px; }
  .kpi-card .label { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; color: #fff; }
  .kpi-card .change { font-size: 12px; margin-top: 6px; }
  .change.up { color: #00d4aa; }
  .change.down { color: #ff6b6b; }
  .change.flat { color: #888; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }

  .card { background: #1a1f2e; border: 1px solid #2a2f45; border-radius: 12px; padding: 20px; }
  .card h3 { font-size: 14px; color: #aaa; margin-bottom: 16px; font-weight: 500; }

  .platform-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2f4522; }
  .platform-row:last-child { border-bottom: none; }
  .platform-name { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .platform-value { font-size: 15px; font-weight: 600; color: #fff; }
  .platform-orders { font-size: 12px; color: #888; }

  .kw-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2f4522; }
  .kw-row:last-child { border-bottom: none; }
  .kw-name { font-size: 13px; color: #ccc; flex: 1; }
  .kw-rank { font-size: 13px; font-weight: 600; color: #fff; width: 40px; text-align: center; }
  .kw-change { font-size: 12px; width: 50px; text-align: right; }

  .alert-row { display: flex; align-items: center; gap: 12px; padding: 10px; background: #ffffff08; border-radius: 8px; margin-bottom: 8px; }
  .alert-icon { font-size: 18px; }
  .alert-text { flex: 1; }
  .alert-title { font-size: 13px; color: #fff; }
  .alert-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .alert-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .badge-red { background: #ff6b6b22; color: #ff6b6b; border: 1px solid #ff6b6b44; }
  .badge-yellow { background: #ffd93d22; color: #ffd93d; border: 1px solid #ffd93d44; }
  .badge-green { background: #00d4aa22; color: #00d4aa; border: 1px solid #00d4aa44; }

  .report-box { background: #ffffff05; border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.8; color: #bbb; border-left: 3px solid #00d4aa; min-height: 120px; }

  canvas { max-height: 220px; }

  @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🐾 宠物保健品智能大脑</h1>
    <div class="update-time">最后更新：<span id="updateTime">加载中...</span></div>
  </div>
  <span class="badge">● 运行中</span>
</div>

<div class="container">

  <!-- KPI 卡片 -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="label">今日总销售额</div>
      <div class="value" id="totalRevenue">$0</div>
      <div class="change up" id="revenueChange">↑ 加载中</div>
    </div>
    <div class="kpi-card">
      <div class="label">今日总订单</div>
      <div class="value" id="totalOrders">0</div>
      <div class="change up" id="ordersChange">↑ 加载中</div>
    </div>
    <div class="kpi-card">
      <div class="label">广告 ACoS</div>
      <div class="value" id="acos">0%</div>
      <div class="change flat" id="acosChange">→ 加载中</div>
    </div>
    <div class="kpi-card">
      <div class="label">国内 GMV</div>
      <div class="value" id="gmv">¥0</div>
      <div class="change up" id="gmvChange">↑ 加载中</div>
    </div>
    <div class="kpi-card">
      <div class="label">库存预警</div>
      <div class="value" id="alertCount">0</div>
      <div class="change flat">个产品需关注</div>
    </div>
    <div class="kpi-card">
      <div class="label">关键词监控</div>
      <div class="value" id="kwCount">0</div>
      <div class="change flat">个词在追踪</div>
    </div>
  </div>

  <!-- 图表 + 平台销售 -->
  <div class="grid-2">
    <div class="card">
      <h3>📈 近7日销售趋势（全平台）</h3>
      <canvas id="salesChart"></canvas>
    </div>
    <div class="card">
      <h3>🏪 今日各平台销售</h3>
      <div id="platformList"></div>
    </div>
  </div>

  <!-- 关键词 + 库存 + 竞品 -->
  <div class="grid-3">
    <div class="card">
      <h3>🔍 关键词排名</h3>
      <div id="keywordList"></div>
    </div>
    <div class="card">
      <h3>📦 库存预警</h3>
      <div id="inventoryList"></div>
    </div>
    <div class="card">
      <h3>🕵️ 竞品动态</h3>
      <div id="competitorList"></div>
    </div>
  </div>

  <!-- AI 日报 -->
  <div class="card">
    <h3>🤖 AI 每日运营简报</h3>
    <div class="report-box" id="aiReport">等待 AI 生成报告中...（配置 Anthropic API Key 后自动生成）</div>
  </div>

</div>

<script>
const SAMPLE = {
  updateTime: new Date().toLocaleString('zh-CN'),
  kpi: { totalRevenue: '$1,280', totalOrders: 47, acos: '28%', gmv: '¥8,650', alertCount: 2, kwCount: 12 },
  revenueChange: '↑ 12% vs 昨日',
  ordersChange: '↑ 8% vs 昨日',
  acosChange: '↓ 3% vs 昨日',
  gmvChange: '↑ 15% vs 昨日',
  salesTrend: {
    labels: ['6/25','6/26','6/27','6/28','6/29','6/30','7/1'],
    amazon: [980, 1100, 890, 1250, 1180, 1320, 1280],
    domestic: [6200, 7100, 5800, 8200, 7600, 8100, 8650]
  },
  platforms: [
    { name: 'Amazon US', color: '#FF9900', revenue: '$820', orders: 28 },
    { name: 'Amazon UK', color: '#FF9900aa', revenue: '$460', orders: 19 },
    { name: 'Shopify',   color: '#96bf48', revenue: '$210', orders: 8 },
    { name: '天猫',      color: '#FF4400', revenue: '¥5,200', orders: 63 },
    { name: '抖音',      color: '#69C9D0', revenue: '¥3,450', orders: 91 },
  ],
  keywords: [
    { name: 'pet supplements', rank: 8,  change: +3 },
    { name: 'dog vitamins',    rank: 15, change: -2 },
    { name: 'pet probiotics',  rank: 6,  change: +5 },
    { name: '宠物保健品',       rank: 3,  change: +1 },
    { name: '狗狗鱼油',         rank: 11, change:  0 },
  ],
  inventory: [
    { name: 'Omega-3 Fish Oil', sku: 'PV-001', days: 12, level: '🔴 紧急', badge: 'badge-red' },
    { name: 'Pet Probiotics',   sku: 'PV-002', days: 25, level: '🟡 注意', badge: 'badge-yellow' },
    { name: 'Dog Vitamins',     sku: 'PV-003', days: 48, level: '🟢 充足', badge: 'badge-green' },
  ],
  competitors: [
    { name: 'Zesty Paws',     change: '降价 $2.00', type: 'badge-yellow' },
    { name: 'PetHonesty',     change: 'BSR +320',   type: 'badge-red' },
    { name: 'NaturVet',       change: '新增评论 48', type: 'badge-green' },
  ],
  aiReport: '📊 今日业绩：全平台合计订单156单，海外销售额$1,280，国内GMV¥8,650，整体环比增长12%。\n\n⚠️ 需关注：Omega-3鱼油库存仅剩12天，建议立即下采购单；PetHonesty BSR排名上升明显，注意竞品动态。\n\n💡 建议：① 鱼油产品开启Lightning Deal冲量 ② 抖音直播场次可增加至每日2场 ③ 关键词"pet probiotics"排名上升快，建议加大广告预算。'
};

document.getElementById('updateTime').textContent = SAMPLE.updateTime;
document.getElementById('totalRevenue').textContent = SAMPLE.kpi.totalRevenue;
document.getElementById('totalOrders').textContent = SAMPLE.kpi.totalOrders;
document.getElementById('acos').textContent = SAMPLE.kpi.acos;
document.getElementById('gmv').textContent = SAMPLE.kpi.gmv;
document.getElementById('alertCount').textContent = SAMPLE.kpi.alertCount;
document.getElementById('kwCount').textContent = SAMPLE.kpi.kwCount;
document.getElementById('revenueChange').textContent = SAMPLE.revenueChange;
document.getElementById('ordersChange').textContent = SAMPLE.ordersChange;
document.getElementById('acosChange').textContent = SAMPLE.acosChange;
document.getElementById('gmvChange').textContent = SAMPLE.gmvChange;

// 销售趋势图
new Chart(document.getElementById('salesChart'), {
  type: 'line',
  data: {
    labels: SAMPLE.salesTrend.labels,
    datasets: [
      { label: '海外($)', data: SAMPLE.salesTrend.amazon, borderColor: '#FF9900', backgroundColor: '#FF990022', tension: 0.4, fill: true },
      { label: '国内(¥/10)', data: SAMPLE.salesTrend.domestic.map(v=>v/10), borderColor: '#00d4aa', backgroundColor: '#00d4aa22', tension: 0.4, fill: true }
    ]
  },
  options: { plugins: { legend: { labels: { color: '#aaa', boxWidth: 12 } } }, scales: { x: { ticks: { color: '#666' }, grid: { color: '#2a2f45' } }, y: { ticks: { color: '#666' }, grid: { color: '#2a2f45' } } } }
});

// 平台列表
document.getElementById('platformList').innerHTML = SAMPLE.platforms.map(p => `
  <div class="platform-row">
    <div class="platform-name"><span class="dot" style="background:${p.color}"></span>${p.name}</div>
    <div><div class="platform-value">${p.revenue}</div><div class="platform-orders">${p.orders} 单</div></div>
  </div>`).join('');

// 关键词
document.getElementById('keywordList').innerHTML = SAMPLE.keywords.map(k => `
  <div class="kw-row">
    <div class="kw-name">${k.name}</div>
    <div class="kw-rank">#${k.rank}</div>
    <div class="kw-change ${k.change>0?'up':k.change<0?'down':'flat'}">${k.change>0?'↑'+k.change:k.change<0?'↓'+Math.abs(k.change):'→'}</div>
  </div>`).join('');

// 库存
document.getElementById('inventoryList').innerHTML = SAMPLE.inventory.map(i => `
  <div class="alert-row">
    <div class="alert-icon">${i.level.split(' ')[0]}</div>
    <div class="alert-text"><div class="alert-title">${i.name}</div><div class="alert-sub">SKU: ${i.sku} · 剩余 ${i.days} 天</div></div>
    <span class="alert-badge ${i.badge}">${i.level.split(' ')[1]}</span>
  </div>`).join('');

// 竞品
document.getElementById('competitorList').innerHTML = SAMPLE.competitors.map(c => `
  <div class="alert-row">
    <div class="alert-icon">🏷️</div>
    <div class="alert-text"><div class="alert-title">${c.name}</div><div class="alert-sub">${c.change}</div></div>
    <span class="alert-badge ${c.type}">关注</span>
  </div>`).join('');

// AI 报告
document.getElementById('aiReport').textContent = SAMPLE.aiReport;
</script>
</body>
</html>
